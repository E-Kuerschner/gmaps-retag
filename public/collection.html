<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection · gmaps-retag</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <div id="dry-run-banner" class="hidden bg-amber-400 text-amber-900 text-sm font-medium text-center py-2 px-4">
    DRY RUN MODE — selectors will be validated but no changes will be written to your saved lists
  </div>

  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4">
    <a href="/collect" class="text-gray-400 hover:text-gray-700 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <div>
      <h1 id="page-title" class="font-semibold text-gray-900">Collection</h1>
      <p id="page-subtitle" class="text-xs text-gray-400 hidden"></p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-6">

    <!-- ── Loading ───────────────────────────────────────────────────────── -->
    <section id="section-loading" class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
      <p class="text-sm text-gray-500">Loading collection…</p>
    </section>

    <!-- ── Review table ──────────────────────────────────────────────────── -->
    <section id="section-review" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="font-medium text-gray-900">
          <span id="review-list-name" class="text-blue-600"></span>
          <span id="review-count" class="ml-2 text-sm text-gray-400"></span>
        </h2>
        <button id="start-update-btn"
          class="rounded-lg bg-green-600 text-white px-5 py-2 text-sm font-medium hover:bg-green-700 transition-colors">
          Start Update
        </button>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Place</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600 w-36">Action</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600 w-48">Move to list</th>
            </tr>
          </thead>
          <tbody id="places-table" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>

      <div class="flex justify-end">
        <button id="start-update-btn-bottom"
          class="rounded-lg bg-green-600 text-white px-5 py-2 text-sm font-medium hover:bg-green-700 transition-colors">
          Start Update
        </button>
      </div>
    </section>

    <!-- ── Update running ────────────────────────────────────────────────── -->
    <section id="section-updating" class="hidden bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
      <div class="flex items-center gap-3 mb-5">
        <div class="spinner"></div>
        <p id="update-status" class="text-sm text-gray-600">Starting…</p>
      </div>
      <div class="mb-4">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span id="progress-label">Processing…</span>
          <span id="progress-fraction"></span>
        </div>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-green-500 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
      </div>
      <div id="update-log-container" class="hidden">
        <h3 id="update-log-heading" class="text-xs font-medium text-gray-600 mb-2"></h3>
        <ul id="update-log" class="space-y-1 max-h-48 overflow-y-auto text-xs"></ul>
      </div>
    </section>

    <!-- ── Update done ───────────────────────────────────────────────────── -->
    <section id="section-done" class="hidden bg-white rounded-xl border p-6 shadow-sm">
      <div class="flex items-center gap-3 mb-3">
        <div id="done-icon" class="rounded-full p-1">
          <svg id="done-icon-check" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          <svg id="done-icon-warn" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
          </svg>
        </div>
        <h2 id="done-heading" class="font-medium"></h2>
      </div>
      <p id="done-message" class="text-sm text-gray-600 mb-4"></p>
      <a href="/collect"
        class="rounded-lg bg-blue-600 text-white px-4 py-2 text-sm font-medium hover:bg-blue-700 transition-colors">
        Back to collections
      </a>
    </section>

    <!-- ── Update error ──────────────────────────────────────────────────── -->
    <section id="section-update-error" class="hidden bg-white rounded-xl border border-red-200 p-6 shadow-sm">
      <div class="flex items-center gap-3 mb-2">
        <div class="rounded-full bg-red-100 p-1">
          <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <h2 class="font-medium text-red-900">Update failed</h2>
      </div>
      <p id="update-error-message" class="text-sm text-red-700 mb-4"></p>
      <button id="retry-btn"
        class="rounded-lg border border-gray-300 px-4 py-2 text-sm font-medium hover:bg-gray-50 transition-colors">
        Try Again
      </button>
    </section>

    <!-- ── Load error (bad file) ─────────────────────────────────────────── -->
    <section id="section-load-error" class="hidden bg-white rounded-xl border border-red-200 p-6 shadow-sm">
      <p id="load-error-message" class="text-sm text-red-700"></p>
    </section>

  </main>

  <script>
    const fileName = decodeURIComponent(window.location.pathname.replace('/collections/', ''));
    let collectionData = null;
    let savedLists = [];
    let updatingThisSession = false;

    async function logClientError(message) {
      try {
        await fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
      } catch { /* best-effort */ }
    }

    async function loadSavedLists() {
      try {
        const res = await fetch('/api/saved-lists');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const lists = await res.json();
        if (lists.length === 0) {
          await logClientError('saved-lists.json was fetched but contains 0 items — falling back to freeform text input for Move to…');
        }
        savedLists = lists;
      } catch (err) {
        await logClientError(`Could not fetch /api/saved-lists: ${err.message} — falling back to freeform text input for Move to…`);
        savedLists = [];
      }
    }

    const ALL_SECTIONS = ['section-loading', 'section-review', 'section-updating',
                          'section-done', 'section-update-error', 'section-load-error'];

    function showSection(id) {
      ALL_SECTIONS.forEach(s => document.getElementById(s).classList.toggle('hidden', s !== id));
    }

    // ── Load collection data ─────────────────────────────────────────────────
    async function loadCollection() {
      try {
        const res = await fetch('/api/collections/' + encodeURIComponent(fileName));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        collectionData = await res.json();
        renderReview(collectionData);
        showSection('section-review');
      } catch (err) {
        document.getElementById('load-error-message').textContent =
          `Could not load collection "${fileName}": ${err.message}`;
        showSection('section-load-error');
      }
    }

    function renderReview(data) {
      document.getElementById('review-list-name').textContent = data.listName || '';
      document.getElementById('review-count').textContent = `(${data.places.length} places)`;
      document.getElementById('page-title').textContent = data.listName || 'Collection';
      document.getElementById('page-subtitle').textContent = fileName;
      document.getElementById('page-subtitle').classList.remove('hidden');

      const tbody = document.getElementById('places-table');
      tbody.innerHTML = '';

      data.places.forEach((place, i) => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50';
        tr.innerHTML = `
          <td class="px-4 py-3">
            <div>
              <span class="font-medium text-gray-900">${escHtml(place.name)}</span>
              ${place.permanentlyClosed
                ? `<span class="inline-block ml-2 rounded px-1.5 py-0.5 text-xs font-medium bg-red-100 text-red-700">Permanently closed</span>`
                : ''
              }
              ${place.note
                ? `<div class="text-xs text-indigo-500 mt-0.5">Note: ${escHtml(place.note)}</div>`
                : ''
              }
            </div>
          </td>
          <td class="px-4 py-3">
            <select data-idx="${i}" class="action-select rounded border border-gray-300 text-xs px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
              <option value="keep">Keep</option>
              <option value="remove" ${place.permanentlyClosed ? 'selected' : ''}>Remove</option>
              <option value="move">Move to…</option>
            </select>
          </td>
          <td class="px-4 py-3">
            ${savedLists.length > 0
              ? `<select data-idx="${i}" class="target-control hidden rounded border border-gray-300 text-xs px-2 py-1 w-full focus:outline-none focus:ring-1 focus:ring-blue-500">
                   ${savedLists.map(l => `<option value="${escHtml(l)}">${escHtml(l)}</option>`).join('')}
                 </select>`
              : `<input data-idx="${i}" class="target-control hidden rounded border border-gray-300 text-xs px-2 py-1 w-full focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="Target list name" type="text" />`
            }
          </td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll('.action-select').forEach(sel => {
        sel.addEventListener('change', () => {
          const idx = sel.dataset.idx;
          const target = tbody.querySelector(`.target-control[data-idx="${idx}"]`);
          target.classList.toggle('hidden', sel.value !== 'move');
          if (sel.value === 'move') target.focus();
        });
      });
    }

    // ── Start update ─────────────────────────────────────────────────────────
    async function startUpdate() {
      const tbody = document.getElementById('places-table');
      const actions = [];

      for (const sel of tbody.querySelectorAll('.action-select')) {
        if (sel.value === 'keep') continue;
        const idx = parseInt(sel.dataset.idx, 10);
        const place = collectionData.places[idx];
        const action = { name: place.name, action: sel.value };

        if (sel.value === 'move') {
          const target = tbody.querySelector(`.target-control[data-idx="${idx}"]`);
          const targetList = target.value.trim();
          if (!targetList) {
            alert(`Please select a target list for "${place.name}"`);
            target.focus();
            return;
          }
          action.targetList = targetList;
        }

        actions.push(action);
      }

      if (actions.length === 0) {
        alert('No actions selected — mark at least one place as Remove or Move to start an update.');
        return;
      }

      document.getElementById('update-log').innerHTML = '';
      document.getElementById('update-log-container').classList.add('hidden');
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-fraction').textContent = '';
      updatingThisSession = true;
      showSection('section-updating');

      const res = await fetch('/api/update/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collectionFile: fileName, actions }),
      });

      if (!res.ok) {
        updatingThisSession = false;
        showSection('section-review');
        const err = await res.json();
        alert(err.error || 'Failed to start update');
      }
    }

    document.getElementById('start-update-btn').addEventListener('click', startUpdate);
    document.getElementById('start-update-btn-bottom').addEventListener('click', startUpdate);

    // ── Retry ────────────────────────────────────────────────────────────────
    document.getElementById('retry-btn').addEventListener('click', async () => {
      await fetch('/api/update/reset', { method: 'POST' });
      updatingThisSession = false;
      showSection('section-review');
    });

    // ── SSE ──────────────────────────────────────────────────────────────────
    function applyState(state) {
      document.getElementById('dry-run-banner').classList.toggle('hidden', !state.dryRun);
      if (!updatingThisSession) return;

      const { update } = state;
      if (update.status === 'running') {
        showSection('section-updating');
        if (update.message) document.getElementById('update-status').textContent = update.message;
        if (update.progress) {
          const { current, total } = update.progress;
          const pct = total > 0 ? Math.round((current / total) * 100) : 0;
          document.getElementById('progress-bar').style.width = pct + '%';
          document.getElementById('progress-fraction').textContent = `${current} / ${total}`;
        }
      } else if (update.status === 'done') {
        updatingThisSession = false;
        showSection('section-done');
        document.getElementById('done-message').textContent = update.message || 'All updates applied.';
        const hasErrors = update.errorCount > 0;
        const section = document.getElementById('section-done');
        section.className = section.className.replace(/border-\S+/, hasErrors ? 'border-amber-300' : 'border-green-200');
        document.getElementById('done-icon').className = `rounded-full p-1 ${hasErrors ? 'bg-amber-100' : 'bg-green-100'}`;
        document.getElementById('done-icon-check').classList.toggle('hidden', hasErrors);
        document.getElementById('done-icon-check').className = document.getElementById('done-icon-check').className.replace(/text-\S+/, 'text-green-600');
        document.getElementById('done-icon-warn').classList.toggle('hidden', !hasErrors);
        document.getElementById('done-icon-warn').className = document.getElementById('done-icon-warn').className.replace(/text-\S+/, 'text-amber-600');
        document.getElementById('done-heading').textContent = hasErrors ? 'Update complete with errors' : 'Update complete';
        document.getElementById('done-heading').className = `font-medium ${hasErrors ? 'text-amber-900' : 'text-green-900'}`;
      } else if (update.status === 'error') {
        updatingThisSession = false;
        showSection('section-update-error');
        document.getElementById('update-error-message').textContent = update.message || 'Unknown error';
      }
    }

    const evtSource = new EventSource('/api/events');
    evtSource.addEventListener('state', e => applyState(JSON.parse(e.data)));
    evtSource.addEventListener('progress', e => {
      if (!updatingThisSession) return;
      const { current, total, name } = JSON.parse(e.data);
      const pct = total > 0 ? Math.round((current / total) * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-fraction').textContent = `${current} / ${total}`;
      document.getElementById('progress-label').textContent = name || 'Processing…';
    });
    evtSource.addEventListener('error', e => {
      if (!updatingThisSession) return;
      const { name, problem } = JSON.parse(e.data);
      const container = document.getElementById('update-log-container');
      const list = document.getElementById('update-log');
      document.getElementById('update-log-heading').textContent = 'Errors encountered';
      document.getElementById('update-log-heading').className = 'text-xs font-medium text-red-700 mb-2';
      container.classList.remove('hidden');
      const li = document.createElement('li');
      li.className = 'text-red-600';
      li.textContent = `${name}: ${problem}`;
      list.appendChild(li);
    });
    evtSource.addEventListener('dryRunAction', e => {
      if (!updatingThisSession) return;
      const { name, action, targetList } = JSON.parse(e.data);
      const container = document.getElementById('update-log-container');
      const list = document.getElementById('update-log');
      document.getElementById('update-log-heading').textContent = 'Actions that would be applied';
      document.getElementById('update-log-heading').className = 'text-xs font-medium text-amber-700 mb-2';
      container.classList.remove('hidden');
      const li = document.createElement('li');
      li.className = 'text-amber-700';
      li.textContent = action === 'move'
        ? `[would move] ${name} → ${targetList}`
        : `[would remove] ${name}`;
      list.appendChild(li);
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    function escHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadSavedLists().then(loadCollection);
  </script>
</body>
</html>
