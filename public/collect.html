<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collect · gmaps-retag</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <div id="dry-run-banner" class="hidden bg-amber-400 text-amber-900 text-sm font-medium text-center py-2 px-4">
    DRY RUN MODE — no changes will be made to your saved lists during the Update step
  </div>

  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4">
    <a href="/" class="text-gray-400 hover:text-gray-700 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="font-semibold text-gray-900">Collect</h1>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-6">

    <!-- ── Idle: start form ──────────────────────────────────────────────── -->
    <section id="section-idle" class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
      <h2 class="font-medium text-gray-900 mb-4">Start a new collection</h2>
      <form id="collect-form" class="flex gap-3">
        <input
          id="list-name"
          type="text"
          placeholder="e.g. Date Night Spots"
          required
          class="flex-1 rounded-lg border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          type="submit"
          class="rounded-lg bg-blue-600 text-white px-5 py-2 text-sm font-medium hover:bg-blue-700 transition-colors disabled:opacity-50"
        >
          Start Collection
        </button>
      </form>

      <!-- ── Inline error banner ───────────────────────────────────────────── -->
      <div id="error-banner" class="hidden mt-3 flex items-start gap-3 rounded-lg bg-red-50 border border-red-200 px-4 py-3">
        <svg class="w-4 h-4 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p id="error-message" class="text-sm text-red-700 flex-1"></p>
        <button id="error-dismiss-btn" class="text-red-400 hover:text-red-600 transition-colors shrink-0" aria-label="Dismiss">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <p class="text-xs text-gray-400 mt-3">
        A browser window will open. Sign into Google Maps if prompted, then
        the tool will navigate and collect automatically.
      </p>
    </section>

    <!-- ── Past collections ──────────────────────────────────────────────── -->
    <section id="past-collections" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="px-4 py-3 bg-gray-50 border-b border-gray-200">
        <h3 class="text-sm font-medium text-gray-700">Past collections</h3>
      </div>
      <ul id="past-collections-list" class="divide-y divide-gray-100 text-sm"></ul>
    </section>

    <!-- ── Running: live progress ────────────────────────────────────────── -->
    <section id="section-running" class="hidden bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
      <div class="flex items-center gap-3 mb-4">
        <div class="spinner"></div>
        <p id="status-message" class="text-sm text-gray-600">Starting…</p>
      </div>
      <div id="live-places" class="space-y-1 max-h-64 overflow-y-auto"></div>
    </section>

  </main>

  <script>
    // collectingThisSession tracks whether THIS page load started a collection.
    // We only auto-redirect to the collection page for collections we initiated —
    // not for a stale 'done' state left over from a previous session.
    let collectingThisSession = false;

    function showSection(id) {
      ['section-idle', 'section-running'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
      document.getElementById('past-collections').classList.toggle('hidden', id !== 'section-idle');
    }

    function showError(message) {
      document.getElementById('error-message').textContent = message;
      document.getElementById('error-banner').classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('error-banner').classList.add('hidden');
    }

    function applyState(state) {
      document.getElementById('dry-run-banner').classList.toggle('hidden', !state.dryRun);
      const { collect } = state;

      if (collect.status === 'running') {
        hideError();
        showSection('section-running');
        if (collect.message) document.getElementById('status-message').textContent = collect.message;
      } else if (collect.status === 'done' && collectingThisSession && collect.outputFile) {
        window.location.href = '/collections/' + encodeURIComponent(collect.outputFile);
      } else if (collect.status === 'error') {
        collectingThisSession = false;
        showSection('section-idle');
        loadPastCollections();
        showError(collect.message || 'Unknown error');
      } else {
        hideError();
        showSection('section-idle');
        loadPastCollections();
      }
    }

    const evtSource = new EventSource('/api/events');
    evtSource.addEventListener('state', e => applyState(JSON.parse(e.data)));
    evtSource.addEventListener('place', e => {
      const place = JSON.parse(e.data);
      const container = document.getElementById('live-places');
      const el = document.createElement('p');
      el.className = 'text-xs text-gray-500 truncate';
      el.textContent = place.name;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    });

    // ── Collect form ─────────────────────────────────────────────────────────
    document.getElementById('collect-form').addEventListener('submit', async e => {
      e.preventDefault();
      const listName = document.getElementById('list-name').value.trim();
      if (!listName) return;

      hideError();
      document.getElementById('live-places').innerHTML = '';
      collectingThisSession = true;

      const res = await fetch('/api/collect/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ listName }),
      });

      if (!res.ok) {
        collectingThisSession = false;
        const err = await res.json();
        showError(err.error || 'Failed to start collection');
      }
    });

    // ── Error dismiss ────────────────────────────────────────────────────────
    document.getElementById('error-dismiss-btn').addEventListener('click', async () => {
      await fetch('/api/collect/reset', { method: 'POST' });
      hideError();
    });

    // ── Past collections ─────────────────────────────────────────────────────
    async function loadPastCollections() {
      const res = await fetch('/api/collect-files');
      const files = await res.json();
      const section = document.getElementById('past-collections');
      const list = document.getElementById('past-collections-list');

      if (files.length === 0) {
        section.classList.add('hidden');
        return;
      }

      list.innerHTML = '';
      files.forEach(fileName => {
        const li = document.createElement('li');
        li.className = 'flex items-center justify-between px-4 py-3';
        li.innerHTML = `
          <a href="/collections/${encodeURIComponent(fileName)}"
             class="text-blue-600 hover:underline font-mono text-xs truncate mr-4">${escHtml(fileName)}</a>
          <button class="delete-btn text-red-500 hover:text-red-700 text-xs font-medium shrink-0"
                  data-file="${escHtml(fileName)}">Delete</button>
        `;
        list.appendChild(li);
      });

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm(`Delete ${btn.dataset.file}?`)) return;
          await fetch(`/api/collect-files/${encodeURIComponent(btn.dataset.file)}`, { method: 'DELETE' });
          loadPastCollections();
        });
      });

      section.classList.remove('hidden');
    }

    loadPastCollections();

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
